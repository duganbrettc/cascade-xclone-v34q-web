server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /healthz {
        proxy_pass http://api:8080/healthz;
    }

    location = / {
        try_files /index.html =404;
    }

    location = /signup {
        try_files /signup.html =404;
    }

    location = /login {
        try_files /login.html =404;
    }

    location = /post {
        try_files /post.html =404;
    }

    location = /profile {
        try_files /profile.html =404;
    }

    location = /users {
        try_files /users.html =404;
    }

    location ~ ^/users/(.+)$ {
        set $username $1;
        sub_filter '__USERNAME__' $username;
        sub_filter_once off;
        try_files /user.html =404;
    }

    location / {
        try_files $uri $uri.html =404;
    }
}
