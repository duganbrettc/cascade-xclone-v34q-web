server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Same-origin API proxy — forwards all /api/* browser requests to the api service.
    # Uses Docker's embedded DNS resolver (127.0.0.11) so nginx starts even when
    # 'api' is not yet resolvable; resolution happens at request time.
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $api_upstream http://api:8080;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Health probe — returns 200 directly so the container passes standalone
    # health checks even when the api upstream is not reachable.
    location = /healthz {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    location = / {
        try_files /index.html =404;
    }

    location = /signup {
        try_files /signup.html =404;
    }

    location = /login {
        try_files /login.html =404;
    }

    location = /post {
        try_files /post.html =404;
    }

    location = /profile {
        try_files /profile.html =404;
    }

    location = /users {
        try_files /users.html =404;
    }

    location ~ ^/users/(.+)$ {
        set $username $1;
        sub_filter '__USERNAME__' $username;
        sub_filter_once off;
        try_files /user.html =404;
    }

    location / {
        try_files $uri $uri.html =404;
    }
}
