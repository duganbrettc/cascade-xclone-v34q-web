server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Docker's embedded DNS — resolve proxy_pass hostnames at request time,
    # not at nginx startup. This is required so the container starts and
    # passes health checks even when the api service is not yet up.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/ {
        set $api_upstream http://api:8080;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # Return 200 directly — do not proxy /healthz to the api upstream.
    # When the deployer health-probes the web container standalone (without
    # the api service on the same network), a proxy_pass here returns 502
    # and the deployer marks the deployment crashed. The web container is
    # healthy when nginx is up; api health is tracked separately.
    location = /healthz {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    location = / {
        try_files /index.html =404;
    }

    location = /signup {
        try_files /signup.html =404;
    }

    location = /login {
        try_files /login.html =404;
    }

    location = /post {
        try_files /post.html =404;
    }

    location = /profile {
        try_files /profile.html =404;
    }

    location = /users {
        try_files /users.html =404;
    }

    location ~ ^/users/(.+)$ {
        set $username $1;
        sub_filter '__USERNAME__' $username;
        sub_filter_once off;
        try_files /user.html =404;
    }

    location / {
        try_files $uri $uri.html =404;
    }
}
